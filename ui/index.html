<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amele Forensic Tool</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="shell theme-dark">
      <aside class="sidebar">
        <div class="brand-row">
          <button class="brand-mark" id="brand-logo" data-route="home" aria-label="Amele ana sayfa">
            <img src="./assets/logo/icon.png" alt="" />
          </button>
        </div>

        <nav class="side-nav" aria-label="Ana menü">
          <button class="nav-item active" data-route="home">
            <span data-icon="home"></span>
            <span data-i18n="nav.home">Ana Sayfa</span>
          </button>
          <button class="nav-item" data-route="windows">
            <span data-icon="windows"></span>
            <span data-i18n="nav.windows">Windows Araçları</span>
          </button>
          <button class="nav-item" data-route="linux">
            <span data-icon="linux"></span>
            <span data-i18n="nav.linux">Linux Araçları</span>
          </button>
          <button class="nav-item" data-route="android">
            <span data-icon="android"></span>
            <span data-i18n="nav.android">Android Araçları</span>
          </button>
          <button class="nav-item" data-route="agent">
            <span data-icon="network"></span>
            <span data-i18n="nav.agent">Agent</span>
          </button>
          <button class="nav-item" data-route="analysis">
            <span data-icon="search"></span>
            <span data-i18n="nav.analysis">Analiz</span>
          </button>
          <button class="nav-item" data-route="other">
            <span data-icon="tiles"></span>
            <span data-i18n="nav.other">Diğer</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="version">v0.0.11</span>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="topbar-spacer" aria-hidden="true"></div>
          <div class="top-actions">
            <button class="top-action" data-route="about" aria-label="Hakkında">
              <span data-icon="info"></span>
            </button>
            <button class="top-action" data-route="settings" aria-label="Ayarlar">
              <span data-icon="settings"></span>
            </button>
          </div>
        </header>

        <main id="view" class="view" tabindex="-1"></main>
      </section>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
