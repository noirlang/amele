name: Worm CI

on:
  push:
    branches:
      - main
      - rewrite-rust
  pull_request:
    branches:
      - main
      - rewrite-rust
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-build:
    name: Linux test and build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check UI JavaScript
        run: node --check ui/app.js

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify Visual C++ runtime is bundled
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALLDIR=%%i
          call "%VSINSTALLDIR%\VC\Auxiliary\Build\vcvars64.bat"
          dumpbin /DEPENDENTS target\release\worm.exe > dependents.txt
          type dependents.txt
          findstr /i "VCRUNTIME MSVCP" dependents.txt && exit /b 1 || exit /b 0

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: worm-linux-x64
          path: target/release/worm
          if-no-files-found: error

  windows-build:
    name: Windows test and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: worm-windows-x64
          path: target/release/worm.exe
          if-no-files-found: error
